services:
  - type: web
    name: luminous-ledger
    env: node
    plan: free
    buildCommand: NODE_ENV=development npm run install-all && npm run build
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
